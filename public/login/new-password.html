<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Change Password | Admin</title>
  <link rel="shortcut icon" href="/imgs/logo.png" type="image/x-icon">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg: #f4f6fa;
      --text: #1e293b;
      --text-secondary: #475569;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --card-bg: #ffffff;
      --card-border: #e9eef3;
      --input-bg: #f8fafc;
      --input-border: #e2e8f0;
      --input-focus: #2563eb;
      --btn-bg: #2563eb;
      --btn-hover: #1d4ed8;
      --btn-text: #ffffff;
      --heading: #0f172a;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
      --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
      --shadow-lg: 0 12px 40px rgba(0,0,0,0.1);
      --toggle-bg: #f1f5f9;
      --badge-bg: #dbeafe;
      --badge-text: #1e40af;
      --success-bg: #dcfce7;
      --success-text: #166534;
      --error-bg: #fee2e2;
      --error-text: #991b1b;
      --details-bg: #f9fafc;
      --icon-bg: #f8fafc;
    }

    [data-theme="dark"] {
      --bg: #1a1a1a;
      --text: #d4d4d4;
      --text-secondary: #a0a0a0;
      --text-muted: #808080;
      --border: #3a3a3a;
      --card-bg: #2a2a2a;
      --card-border: #3a3a3a;
      --input-bg: #1e1e1e;
      --input-border: #3a3a3a;
      --input-focus: #60a5fa;
      --btn-bg: #3b82f6;
      --btn-hover: #2563eb;
      --btn-text: #ffffff;
      --heading: #e0e0e0;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.3);
      --shadow-md: 0 4px 12px rgba(0,0,0,0.4);
      --shadow-lg: 0 12px 40px rgba(0,0,0,0.5);
      --toggle-bg: #333333;
      --badge-bg: #2a2a2a;
      --badge-text: #a0a0a0;
      --success-bg: #1a3a2a;
      --success-text: #48bb78;
      --error-bg: #3a1a1a;
      --error-text: #fc8181;
      --details-bg: #2a2a2a;
      --icon-bg: #222222;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: var(--bg);
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 2rem;
      color: var(--text);
      transition: background 0.3s ease, color 0.3s ease;
      position: relative;
    }

    /* Background decoration */
    .bg-decoration {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }

    .bg-decoration .circle {
      position: absolute;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(37, 99, 235, 0.05) 0%, transparent 70%);
    }

    .bg-decoration .circle:nth-child(1) {
      width: 400px;
      height: 400px;
      top: -100px;
      right: -100px;
    }

    .bg-decoration .circle:nth-child(2) {
      width: 300px;
      height: 300px;
      bottom: -50px;
      left: -50px;
    }

    .container {
      width: 100%;
      max-width: 480px;
      animation: fadeIn 0.6s ease;
      position: relative;
      z-index: 1;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Card */
    .password-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 1.3rem;
      padding: 2.5rem 2rem;
      box-shadow: var(--shadow-lg);
      transition: all 0.3s ease;
    }

    .password-card:hover {
      border-color: var(--input-focus);
      box-shadow: var(--shadow-lg), 0 0 0 1px var(--input-focus);
    }

    /* Header with theme toggle */
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
    }

    .theme-toggle {
      background: var(--toggle-bg);
      border: 1px solid var(--border);
      color: var(--text);
      width: 36px;
      height: 36px;
      border-radius: 0.6rem;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 1rem;
      transition: all 0.2s ease;
    }

    .theme-toggle:hover {
      background: var(--input-focus);
      color: white;
      border-color: var(--input-focus);
    }

    /* Icon */
    .icon-wrapper {
      width: 80px;
      height: 80px;
      margin: 0 auto 1.2rem;
      border-radius: 50%;
      background: var(--icon-bg);
      border: 2px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
    }

    .icon-wrapper:hover {
      border-color: var(--input-focus);
      box-shadow: 0 0 30px rgba(37, 99, 235, 0.1);
    }

    .icon-wrapper i {
      font-size: 2.5rem;
      color: var(--input-focus);
    }

    .title {
      text-align: center;
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--heading);
      margin-bottom: 0.3rem;
    }

    .subtitle {
      text-align: center;
      color: var(--text-secondary);
      font-size: 0.9rem;
      margin-bottom: 2rem;
    }

    .subtitle i {
      color: var(--input-focus);
      margin-right: 0.3rem;
    }

    /* Steps indicator */
    .steps {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 2rem;
    }

    .step {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.75rem;
      color: var(--text-muted);
      font-weight: 500;
    }

    .step .step-number {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: var(--toggle-bg);
      border: 1px solid var(--border);
      font-size: 0.7rem;
      font-weight: 700;
      transition: all 0.3s ease;
    }

    .step.active .step-number {
      background: var(--input-focus);
      color: white;
      border-color: var(--input-focus);
    }

    .step.active {
      color: var(--text);
    }

    .step-line {
      width: 30px;
      height: 2px;
      background: var(--border);
    }

    .step-line.active {
      background: var(--input-focus);
    }

    /* Form */
    .form-group {
      margin-bottom: 1.2rem;
    }

    .form-group label {
      display: block;
      margin-bottom: 0.5rem;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-secondary);
      letter-spacing: 0.3px;
    }

    .form-group label i {
      margin-right: 0.5rem;
      color: var(--input-focus);
      font-size: 0.8rem;
    }

    .input-wrapper {
      position: relative;
    }

    .input-wrapper .input-icon {
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 0.9rem;
      transition: color 0.3s ease;
      pointer-events: none;
    }

    .input-wrapper input {
      width: 100%;
      padding: 0.9rem 1rem 0.9rem 2.8rem;
      background: var(--input-bg);
      color: var(--text);
      border: 1px solid var(--input-border);
      border-radius: 0.8rem;
      font-size: 0.95rem;
      font-family: 'Inter', sans-serif;
      transition: all 0.3s ease;
    }

    .input-wrapper input::placeholder {
      color: var(--text-muted);
    }

    .input-wrapper input:focus {
      outline: none;
      border-color: var(--input-focus);
      background: var(--card-bg);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
    }

    .input-wrapper input:focus ~ .input-icon {
      color: var(--input-focus);
    }

    .input-wrapper input:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .password-toggle {
      position: absolute;
      right: 1rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 0.9rem;
      transition: color 0.3s ease;
      padding: 0.2rem;
    }

    .password-toggle:hover {
      color: var(--text);
    }

    /* Password strength indicator */
    .password-strength {
      margin-top: 0.5rem;
      display: flex;
      gap: 0.3rem;
      align-items: center;
    }

    .strength-bar {
      flex: 1;
      height: 4px;
      border-radius: 2px;
      background: var(--border);
      transition: background 0.3s ease;
    }

    .strength-bar.weak { background: #fc8181; }
    .strength-bar.medium { background: #ecc94b; }
    .strength-bar.strong { background: #48bb78; }

    .strength-text {
      font-size: 0.7rem;
      color: var(--text-muted);
      min-width: 50px;
      text-align: right;
    }

    /* Buttons */
    .btn {
      width: 100%;
      padding: 0.9rem;
      border: none;
      border-radius: 0.8rem;
      font-size: 0.95rem;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      margin-top: 0.5rem;
    }

    .btn-primary {
      background: var(--btn-bg);
      color: var(--btn-text);
    }

    .btn-primary:hover:not(:disabled) {
      background: var(--btn-hover);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(37, 99, 235, 0.3);
    }

    .btn-primary:active:not(:disabled) {
      transform: translateY(0);
    }

    .btn-primary:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .btn-secondary {
      background: var(--toggle-bg);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover {
      background: var(--border);
      transform: translateY(-2px);
    }

    .btn i {
      font-size: 1rem;
    }

    /* Message */
    .message {
      margin-top: 1rem;
      padding: 0.8rem 1rem;
      border-radius: 0.8rem;
      text-align: center;
      font-size: 0.85rem;
      display: none;
      animation: slideDown 0.3s ease;
    }

    .message.show {
      display: block;
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .message.success {
      background: var(--success-bg);
      color: var(--success-text);
      border: 1px solid var(--success-text);
    }

    .message.success i {
      margin-right: 0.5rem;
    }

    .message.error {
      background: var(--error-bg);
      color: var(--error-text);
      border: 1px solid var(--error-text);
    }

    .message.error i {
      margin-right: 0.5rem;
    }

    .message.info {
      background: var(--badge-bg);
      color: var(--badge-text);
      border: 1px solid var(--badge-text);
    }

    .message.info i {
      margin-right: 0.5rem;
    }

    /* Spinner */
    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* Back link */
    .back-link {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      margin-top: 1.5rem;
      color: var(--text-muted);
      font-size: 0.85rem;
      text-decoration: none;
      transition: color 0.3s ease;
    }

    .back-link:hover {
      color: var(--input-focus);
    }

    .back-link i {
      font-size: 0.8rem;
    }

    /* Username display */
    .username-display {
      text-align: center;
      padding: 0.5rem 1rem;
      background: var(--toggle-bg);
      border-radius: 2rem;
      display: inline-block;
      margin: 0 auto 1.5rem;
      font-size: 0.85rem;
      color: var(--text-secondary);
      border: 1px solid var(--border);
    }

    .username-display strong {
      color: var(--text);
    }

    .username-display i {
      color: var(--input-focus);
      margin-right: 0.3rem;
    }

    .text-center {
      text-align: center;
    }

    /* Shake animation */
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
      20%, 40%, 60%, 80% { transform: translateX(5px); }
    }

    .shake {
      animation: shake 0.5s ease;
    }

    /* Responsive */
    @media (max-width: 480px) {
      body {
        padding: 1rem;
      }

      .password-card {
        padding: 1.8rem 1.2rem;
      }

      .title {
        font-size: 1.5rem;
      }

      .icon-wrapper {
        width: 64px;
        height: 64px;
      }

      .icon-wrapper i {
        font-size: 2rem;
      }

      .input-wrapper input {
        padding: 0.8rem 1rem 0.8rem 2.5rem;
        font-size: 0.9rem;
      }

      .steps {
        flex-wrap: wrap;
        gap: 0.3rem;
      }

      .step {
        font-size: 0.7rem;
      }

      .step-line {
        width: 15px;
      }
    }
  </style>
</head>
<body>

  <!-- Background Decoration -->
  <div class="bg-decoration">
    <div class="circle"></div>
    <div class="circle"></div>
  </div>

  <div class="container">
    <div class="password-card">

      <!-- Header with Theme Toggle -->
      <div class="card-header">
        <div></div>
        <button class="theme-toggle" id="themeToggle" title="Toggle dark/light mode">
          <i class="fas fa-moon"></i>
        </button>
      </div>

      <!-- Icon -->
      <div class="icon-wrapper">
        <i class="fas fa-key"></i>
      </div>

      <!-- Title -->
      <h1 class="title">Change Password</h1>
      <p class="subtitle">
        <i class="fas fa-shield-alt"></i>
        Secure your account with a new password
      </p>

      <!-- Steps Indicator -->
      <div class="steps" id="steps">
        <div class="step active" id="step1">
          <span class="step-number">1</span>
          <span>Verify</span>
        </div>
        <div class="step-line active" id="line1"></div>
        <div class="step" id="step2">
          <span class="step-number">2</span>
          <span>Change</span>
        </div>
        <div class="step-line" id="line2"></div>
        <div class="step" id="step3">
          <span class="step-number">3</span>
          <span>Done</span>
        </div>
      </div>

      <!-- Step 1: Username Verification -->
      <div id="step1-content">
        <form id="verifyForm">
          <div class="form-group">
            <label for="username">
              <i class="fas fa-user"></i> Username
            </label>
            <div class="input-wrapper">
              <input
                type="text"
                id="username"
                placeholder="Enter your username"
                required
                autocomplete="username"
              >
              <i class="fas fa-user input-icon"></i>
            </div>
          </div>

          <button type="submit" class="btn btn-primary" id="verifyBtn">
            <i class="fas fa-search"></i>
            <span>Verify User</span>
          </button>

          <div id="verifyMessage" class="message"></div>
        </form>
      </div>

      <!-- Step 2: Password Change (hidden initially) -->
      <div id="step2-content" style="display: none;">
        <div class="text-center">
          <div class="username-display">
            <i class="fas fa-user-check"></i>
            User: <strong id="displayUsername">—</strong>
          </div>
        </div>

        <form id="changeForm">
          <div class="form-group">
            <label for="oldPassword">
              <i class="fas fa-lock"></i> Current Password
            </label>
            <div class="input-wrapper">
              <input
                type="password"
                id="oldPassword"
                placeholder="Enter your current password"
                required
                autocomplete="current-password"
              >
              <i class="fas fa-key input-icon"></i>
              <button type="button" class="password-toggle" id="toggleOldPassword" aria-label="Toggle password visibility">
                <i class="fas fa-eye"></i>
              </button>
            </div>
          </div>

          <div class="form-group">
            <label for="newPassword">
              <i class="fas fa-lock"></i> New Password
            </label>
            <div class="input-wrapper">
              <input
                type="password"
                id="newPassword"
                placeholder="Enter your new password (min 8 chars)"
                required
                autocomplete="new-password"
                minlength="8"
              >
              <i class="fas fa-key input-icon"></i>
              <button type="button" class="password-toggle" id="toggleNewPassword" aria-label="Toggle password visibility">
                <i class="fas fa-eye"></i>
              </button>
            </div>
            <div class="password-strength" id="strengthIndicator">
              <div class="strength-bar" id="strength1"></div>
              <div class="strength-bar" id="strength2"></div>
              <div class="strength-bar" id="strength3"></div>
              <span class="strength-text" id="strengthText">Weak</span>
            </div>
          </div>

          <div class="form-group">
            <label for="confirmPassword">
              <i class="fas fa-check-circle"></i> Confirm New Password
            </label>
            <div class="input-wrapper">
              <input
                type="password"
                id="confirmPassword"
                placeholder="Confirm your new password"
                required
                autocomplete="new-password"
              >
              <i class="fas fa-check input-icon"></i>
              <button type="button" class="password-toggle" id="toggleConfirmPassword" aria-label="Toggle password visibility">
                <i class="fas fa-eye"></i>
              </button>
            </div>
          </div>

          <div style="display: flex; gap: 0.8rem; margin-top: 0.5rem;">
            <button type="button" class="btn btn-secondary" id="backBtn" style="flex: 0.4;">
              <i class="fas fa-arrow-left"></i> Back
            </button>
            <button type="submit" class="btn btn-primary" id="changeBtn" style="flex: 0.6;">
              <i class="fas fa-save"></i>
              <span>Change Password</span>
            </button>
          </div>

          <div id="changeMessage" class="message"></div>
        </form>
      </div>

      <!-- Step 3: Success (hidden initially) -->
      <div id="step3-content" style="display: none;">
        <div class="text-center">
          <div style="font-size: 4rem; color: #48bb78; margin-bottom: 1rem;">
            <i class="fas fa-check-circle"></i>
          </div>
          <h2 style="color: var(--heading); margin-bottom: 0.5rem;">Password Changed!</h2>
          <p style="color: var(--text-secondary); margin-bottom: 1.5rem;">
            Your password has been updated successfully.
            You will be redirected to the login page in a few seconds.
          </p>
          <div class="spinner" style="margin: 0 auto; border-color: var(--border); border-top-color: var(--input-focus);"></div>
          <p style="color: var(--text-muted); font-size: 0.8rem; margin-top: 1rem;">
            Redirecting in <span id="countdown">5</span> seconds...
          </p>
          <a href="/" class="btn btn-primary" style="margin-top: 1rem; text-decoration: none;">
            <i class="fas fa-sign-in-alt"></i> Go to Login
          </a>
        </div>
      </div>

      <!-- Back to Dashboard -->
      <a href="/admin/" class="back-link">
        <i class="fas fa-arrow-left"></i>
        Back to Dashboard
      </a>

    </div>
  </div>

  <script>
    (function() {
      // ===== THEME TOGGLE =====
      const html = document.documentElement;
      const themeToggle = document.getElementById('themeToggle');
      const savedTheme = localStorage.getItem('tinnybackend-theme');
      
      if (savedTheme) {
        html.setAttribute('data-theme', savedTheme);
      } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
        html.setAttribute('data-theme', 'dark');
      }

      function updateThemeUI(theme) {
        const icon = themeToggle.querySelector('i');
        if (theme === 'dark') {
          icon.classList.remove('fa-moon');
          icon.classList.add('fa-sun');
        } else {
          icon.classList.remove('fa-sun');
          icon.classList.add('fa-moon');
        }
      }

      updateThemeUI(html.getAttribute('data-theme'));

      themeToggle.addEventListener('click', () => {
        const currentTheme = html.getAttribute('data-theme');
        const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
        html.setAttribute('data-theme', newTheme);
        localStorage.setItem('tinnybackend-theme', newTheme);
        updateThemeUI(newTheme);
      });

      if (window.matchMedia) {
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', (e) => {
          if (!localStorage.getItem('tinnybackend-theme')) {
            const newTheme = e.matches ? 'dark' : 'light';
            html.setAttribute('data-theme', newTheme);
            updateThemeUI(newTheme);
          }
        });
      }

      // ===== PASSWORD CHANGE LOGIC =====
      const verifyForm = document.getElementById('verifyForm');
      const changeForm = document.getElementById('changeForm');
      const usernameInput = document.getElementById('username');
      const oldPasswordInput = document.getElementById('oldPassword');
      const newPasswordInput = document.getElementById('newPassword');
      const confirmPasswordInput = document.getElementById('confirmPassword');
      const verifyBtn = document.getElementById('verifyBtn');
      const changeBtn = document.getElementById('changeBtn');
      const backBtn = document.getElementById('backBtn');
      const verifyMessage = document.getElementById('verifyMessage');
      const changeMessage = document.getElementById('changeMessage');
      const displayUsername = document.getElementById('displayUsername');
      const step1 = document.getElementById('step1');
      const step2 = document.getElementById('step2');
      const step3 = document.getElementById('step3');
      const line1 = document.getElementById('line1');
      const line2 = document.getElementById('line2');
      const step1Content = document.getElementById('step1-content');
      const step2Content = document.getElementById('step2-content');
      const step3Content = document.getElementById('step3-content');
      const countdown = document.getElementById('countdown');

      let verifiedUsername = '';

      // Password visibility toggles
      document.getElementById('toggleOldPassword').addEventListener('click', function() {
        togglePasswordVisibility(oldPasswordInput, this);
      });

      document.getElementById('toggleNewPassword').addEventListener('click', function() {
        togglePasswordVisibility(newPasswordInput, this);
      });

      document.getElementById('toggleConfirmPassword').addEventListener('click', function() {
        togglePasswordVisibility(confirmPasswordInput, this);
      });

      function togglePasswordVisibility(input, button) {
        const type = input.getAttribute('type') === 'password' ? 'text' : 'password';
        input.setAttribute('type', type);
        button.querySelector('i').classList.toggle('fa-eye');
        button.querySelector('i').classList.toggle('fa-eye-slash');
      }

      // Password strength indicator
      newPasswordInput.addEventListener('input', function() {
        const password = this.value;
        const strength = checkPasswordStrength(password);
        updateStrengthIndicator(strength);
      });

      function checkPasswordStrength(password) {
        let score = 0;
        if (password.length >= 8) score++;
        if (password.length >= 12) score++;
        if (/[a-z]/.test(password) && /[A-Z]/.test(password)) score++;
        if (/\d/.test(password)) score++;
        if (/[!@#$%^&*(),.?":{}|<>]/.test(password)) score++;
        return score;
      }

      function updateStrengthIndicator(score) {
        const bars = [
          document.getElementById('strength1'),
          document.getElementById('strength2'),
          document.getElementById('strength3')
        ];
        const text = document.getElementById('strengthText');

        // Reset bars
        bars.forEach(bar => bar.className = 'strength-bar');

        if (score === 0) {
          text.textContent = 'Weak';
          return;
        }

        if (score <= 2) {
          bars[0].classList.add('weak');
          text.textContent = 'Weak';
        } else if (score <= 3) {
          bars[0].classList.add('medium');
          bars[1].classList.add('medium');
          text.textContent = 'Medium';
        } else {
          bars[0].classList.add('strong');
          bars[1].classList.add('strong');
          bars[2].classList.add('strong');
          text.textContent = 'Strong';
        }
      }

      // Show message function
      function showMessage(element, text, type = 'error') {
        element.textContent = '';
        element.className = 'message show ' + type;
        
        const icon = document.createElement('i');
        if (type === 'success') icon.className = 'fas fa-check-circle';
        else if (type === 'info') icon.className = 'fas fa-info-circle';
        else icon.className = 'fas fa-exclamation-circle';
        
        element.appendChild(icon);
        element.appendChild(document.createTextNode(' ' + text));
        
        if (type === 'error') {
          element.classList.add('shake');
          setTimeout(() => {
            element.classList.remove('shake');
          }, 500);
        }
      }

      function hideMessage(element) {
        element.className = 'message';
        element.textContent = '';
      }

      function setLoading(button, isLoading) {
        if (isLoading) {
          button.disabled = true;
          button.innerHTML = '<span class="spinner"></span> Processing...';
        } else {
          button.disabled = false;
          const originalText = button.querySelector('span')?.textContent || 'Submit';
          const originalIcon = button.querySelector('i')?.className || '';
          button.innerHTML = `<i class="${originalIcon}"></i> <span>${originalText}</span>`;
        }
      }

      // Update steps
      function updateStep(step) {
        [step1, step2, step3].forEach((s, index) => {
          s.classList.toggle('active', index < step);
        });
        [line1, line2].forEach((line, index) => {
          if (line) line.classList.toggle('active', index < step - 1);
        });
      }

      // Step 1: Verify username
      verifyForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        hideMessage(verifyMessage);

        const username = usernameInput.value.trim();

        if (!username) {
          showMessage(verifyMessage, 'Please enter your username', 'error');
          usernameInput.focus();
          return;
        }

        setLoading(verifyBtn, true);

        try {
          const response = await fetch(`/api/passwd/${username}`, {
            method: 'GET',
            headers: {
              'Content-Type': 'application/json',
            },
            credentials: 'same-origin'
          });

          const data = await response.json();

          if (response.ok && data.status === 'found') {
            verifiedUsername = data.user;
            showMessage(verifyMessage, `User ${data.user} verified!`, 'success');
            
            // Update UI for step 2
            displayUsername.textContent = data.user;
            step1Content.style.display = 'none';
            step2Content.style.display = 'block';
            updateStep(2);
            
            // Focus on old password
            oldPasswordInput.focus();
          } else {
            showMessage(verifyMessage, 'User not found. Please check the username.', 'error');
            usernameInput.value = '';
            usernameInput.focus();
          }
        } catch (error) {
          console.error('Verification error:', error);
          showMessage(verifyMessage, 'Network error. Please try again.', 'error');
        } finally {
          setLoading(verifyBtn, false);
        }
      });

      // Step 2: Change password
      changeForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        hideMessage(changeMessage);

        const oldPassword = oldPasswordInput.value.trim();
        const newPassword = newPasswordInput.value.trim();
        const confirmPassword = confirmPasswordInput.value.trim();

        if (!oldPassword || !newPassword || !confirmPassword) {
          showMessage(changeMessage, 'Please fill in all fields', 'error');
          return;
        }

        if (newPassword.length < 8) {
          showMessage(changeMessage, 'Password must be at least 8 characters long', 'error');
          newPasswordInput.focus();
          return;
        }

        if (newPassword !== confirmPassword) {
          showMessage(changeMessage, 'Passwords do not match', 'error');
          confirmPasswordInput.focus();
          return;
        }

        if (oldPassword === newPassword) {
          showMessage(changeMessage, 'New password must be different from current password', 'error');
          newPasswordInput.focus();
          return;
        }

        setLoading(changeBtn, true);

        try {
          const response = await fetch('/api/passwd/change', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
            },
            body: JSON.stringify({
              "userName": verifiedUsername,
              oldpwd: oldPassword,
              newpwd: newPassword
            }),
            credentials: 'same-origin'
          });

          const data = await response.json();

          if (response.ok && data.status === 'password changed') {
            // Success - show step 3
            step2Content.style.display = 'none';
            step3Content.style.display = 'block';
            updateStep(3);
            
            // Start countdown
            let seconds = 5;
            countdown.textContent = seconds;
            const interval = setInterval(() => {
              seconds--;
              countdown.textContent = seconds;
              if (seconds <= 0) {
                clearInterval(interval);
                window.location.href = '/';
              }
            }, 1000);
          } else if (data.status === 'password not corect') {
            showMessage(changeMessage, 'Current password is incorrect', 'error');
            oldPasswordInput.value = '';
            oldPasswordInput.focus();
          } else if (data.status === 'password must be 8 char +') {
            showMessage(changeMessage, 'Password must be at least 8 characters long', 'error');
            newPasswordInput.value = '';
            confirmPasswordInput.value = '';
            newPasswordInput.focus();
          } else {
            showMessage(changeMessage, data.message || 'Failed to change password', 'error');
          }
        } catch (error) {
          console.error('Password change error:', error);
          showMessage(changeMessage, 'Network error. Please try again.', 'error');
        } finally {
          setLoading(changeBtn, false);
        }
      });

      // Back button
      backBtn.addEventListener('click', () => {
        hideMessage(changeMessage);
        step2Content.style.display = 'none';
        step1Content.style.display = 'block';
        updateStep(1);
        usernameInput.focus();
      });

      // Enter key support for forms
      oldPasswordInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          newPasswordInput.focus();
        }
      });

      newPasswordInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          confirmPasswordInput.focus();
        }
      });

      confirmPasswordInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          changeForm.dispatchEvent(new Event('submit'));
        }
      });

      // Auto-focus username on load
      usernameInput.focus();

    })();
  </script>

</body>
</html>

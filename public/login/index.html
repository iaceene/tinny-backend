<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Admin Login | Server Dashboard</title>
  <link rel="shortcut icon" href="/imgs/logo.png" type="image/x-icon">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg: #f4f6fa;
      --text: #1e293b;
      --text-secondary: #475569;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --card-bg: #ffffff;
      --card-border: #e9eef3;
      --input-bg: #f8fafc;
      --input-border: #e2e8f0;
      --input-focus: #2563eb;
      --btn-bg: #2563eb;
      --btn-hover: #1d4ed8;
      --btn-text: #ffffff;
      --heading: #0f172a;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
      --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
      --shadow-lg: 0 12px 40px rgba(0,0,0,0.1);
      --toggle-bg: #f1f5f9;
      --badge-bg: #dbeafe;
      --badge-text: #1e40af;
      --success-bg: #dcfce7;
      --success-text: #166534;
      --error-bg: #fee2e2;
      --error-text: #991b1b;
      --details-bg: #f9fafc;
    }

    [data-theme="dark"] {
      --bg: #1a1a1a;
      --text: #d4d4d4;
      --text-secondary: #a0a0a0;
      --text-muted: #808080;
      --border: #3a3a3a;
      --card-bg: #2a2a2a;
      --card-border: #3a3a3a;
      --input-bg: #1e1e1e;
      --input-border: #3a3a3a;
      --input-focus: #60a5fa;
      --btn-bg: #3b82f6;
      --btn-hover: #2563eb;
      --btn-text: #ffffff;
      --heading: #e0e0e0;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.3);
      --shadow-md: 0 4px 12px rgba(0,0,0,0.4);
      --shadow-lg: 0 12px 40px rgba(0,0,0,0.5);
      --toggle-bg: #333333;
      --badge-bg: #2a2a2a;
      --badge-text: #a0a0a0;
      --success-bg: #1a3a2a;
      --success-text: #48bb78;
      --error-bg: #3a1a1a;
      --error-text: #fc8181;
      --details-bg: #2a2a2a;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: var(--bg);
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      color: var(--text);
      transition: background 0.3s ease, color 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      position: relative;
    }

    /* Background decoration */
    .bg-decoration {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }

    .bg-decoration .circle {
      position: absolute;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(37, 99, 235, 0.05) 0%, transparent 70%);
    }

    .bg-decoration .circle:nth-child(1) {
      width: 400px;
      height: 400px;
      top: -100px;
      right: -100px;
    }

    .bg-decoration .circle:nth-child(2) {
      width: 300px;
      height: 300px;
      bottom: -50px;
      left: -50px;
    }

    .login-container {
      width: 100%;
      max-width: 440px;
      animation: fadeIn 0.6s ease;
      position: relative;
      z-index: 1;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Login Card */
    .login-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 1.3rem;
      padding: 2.5rem 2rem;
      box-shadow: var(--shadow-lg);
      transition: all 0.3s ease;
      backdrop-filter: blur(10px);
    }

    .login-card:hover {
      border-color: var(--input-focus);
      box-shadow: var(--shadow-lg), 0 0 0 1px var(--input-focus);
    }

    /* Header with theme toggle */
    .login-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
    }

    .theme-toggle {
      background: var(--toggle-bg);
      border: 1px solid var(--border);
      color: var(--text);
      width: 36px;
      height: 36px;
      border-radius: 0.6rem;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 1rem;
      transition: all 0.2s ease;
    }

    .theme-toggle:hover {
      background: var(--input-focus);
      color: white;
      border-color: var(--input-focus);
    }

    /* Logo Section */
    .logo-section {
      text-align: center;
      margin-bottom: 2rem;
    }

    .logo-wrapper {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 80px;
      height: 80px;
      background: white;
      border: 2px solid var(--border);
      border-radius: 1.2rem;
      margin-bottom: 1.2rem;
      transition: all 0.3s ease;
    }

    .logo-wrapper:hover {
      border-color: var(--input-focus);
      box-shadow: 0 0 30px rgba(37, 99, 235, 0.1);
    }

    .logo-wrapper img {
      width: 50px;
      height: auto;
      object-fit: contain;
    }

    .login-title {
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--heading);
      letter-spacing: -0.3px;
    }

    .login-subtitle {
      color: var(--text-secondary);
      font-size: 0.9rem;
      margin-top: 0.3rem;
    }

    .login-subtitle i {
      color: var(--input-focus);
      margin-right: 0.3rem;
    }

    /* Form Styles */
    .form-group {
      margin-bottom: 1.2rem;
    }

    .form-group label {
      display: block;
      margin-bottom: 0.5rem;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-secondary);
      letter-spacing: 0.3px;
    }

    .form-group label i {
      margin-right: 0.5rem;
      color: var(--input-focus);
      font-size: 0.8rem;
    }

    .input-wrapper {
      position: relative;
    }

    .input-wrapper .input-icon {
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 0.9rem;
      transition: color 0.3s ease;
      pointer-events: none;
    }

    .input-wrapper input {
      width: 100%;
      padding: 0.9rem 1rem 0.9rem 2.8rem;
      background: var(--input-bg);
      color: var(--text);
      border: 1px solid var(--input-border);
      border-radius: 0.8rem;
      font-size: 0.95rem;
      font-family: 'Inter', sans-serif;
      transition: all 0.3s ease;
    }

    .input-wrapper input::placeholder {
      color: var(--text-muted);
    }

    .input-wrapper input:focus {
      outline: none;
      border-color: var(--input-focus);
      background: var(--card-bg);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
    }

    .input-wrapper input:focus ~ .input-icon {
      color: var(--input-focus);
    }

    .input-wrapper input:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .password-toggle {
      position: absolute;
      right: 1rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 0.9rem;
      transition: color 0.3s ease;
      padding: 0.2rem;
    }

    .password-toggle:hover {
      color: var(--text);
    }

    /* Login Button */
    .login-btn {
      width: 100%;
      background: var(--btn-bg);
      color: var(--btn-text);
      border: none;
      border-radius: 0.8rem;
      padding: 0.9rem;
      font-size: 0.95rem;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      margin-top: 0.5rem;
      position: relative;
      overflow: hidden;
    }

    .login-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, transparent 50%);
      pointer-events: none;
    }

    .login-btn:hover:not(:disabled) {
      background: var(--btn-hover);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(37, 99, 235, 0.3);
    }

    .login-btn:active:not(:disabled) {
      transform: translateY(0);
    }

    .login-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .login-btn i {
      font-size: 1rem;
    }

    /* Message */
    .message {
      margin-top: 1rem;
      padding: 0.8rem 1rem;
      border-radius: 0.8rem;
      text-align: center;
      font-size: 0.85rem;
      display: none;
      animation: slideDown 0.3s ease;
    }

    .message.show {
      display: block;
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .message.success {
      background: var(--success-bg);
      color: var(--success-text);
      border: 1px solid var(--success-text);
    }

    .message.success i {
      margin-right: 0.5rem;
    }

    .message.error {
      background: var(--error-bg);
      color: var(--error-text);
      border: 1px solid var(--error-text);
    }

    .message.error i {
      margin-right: 0.5rem;
    }

    .message.info {
      background: var(--badge-bg);
      color: var(--badge-text);
      border: 1px solid var(--badge-text);
    }

    .message.info i {
      margin-right: 0.5rem;
    }

    /* Decorative elements */
    .decorative-line {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin: 1.5rem 0 1rem;
    }

    .decorative-line::before,
    .decorative-line::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--border), transparent);
    }

    .decorative-line span {
      color: var(--text-muted);
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-weight: 600;
    }

    /* Footer */
    .footer {
      text-align: center;
      margin-top: 1.8rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 0.8rem;
    }

    .footer a {
      color: var(--input-focus);
      text-decoration: none;
      font-weight: 500;
      transition: color 0.3s ease;
    }

    .footer a:hover {
      color: var(--btn-hover);
      text-decoration: underline;
    }

    .footer i {
      margin: 0 0.3rem;
      font-size: 0.7rem;
      color: var(--text-muted);
    }

    /* Badge */
    .badge {
      display: inline-block;
      background: var(--badge-bg);
      color: var(--badge-text);
      padding: 0.2rem 0.6rem;
      border-radius: 30px;
      font-size: 0.65rem;
      font-weight: 700;
      border: 1px solid var(--border);
    }

    /* Loading spinner for button */
    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* Shake animation for error */
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
      20%, 40%, 60%, 80% { transform: translateX(5px); }
    }

    .shake {
      animation: shake 0.5s ease;
    }

    /* Responsive */
    @media (max-width: 480px) {
      body {
        padding: 1rem;
      }

      .login-card {
        padding: 1.8rem 1.2rem;
      }

      .login-title {
        font-size: 1.5rem;
      }

      .logo-wrapper {
        width: 64px;
        height: 64px;
      }

      .logo-wrapper img {
        width: 40px;
      }

      .input-wrapper input {
        padding: 0.8rem 1rem 0.8rem 2.5rem;
        font-size: 0.9rem;
      }

      .login-header {
        margin-bottom: 1rem;
      }
    }
  </style>
</head>
<body>

  <!-- Background Decoration -->
  <div class="bg-decoration">
    <div class="circle"></div>
    <div class="circle"></div>
  </div>

  <div class="login-container">
    <div class="login-card">

      <!-- Header with Theme Toggle -->
      <div class="login-header">
        <div></div>
        <button class="theme-toggle" id="themeToggle" title="Toggle dark/light mode">
          <i class="fas fa-moon"></i>
        </button>
      </div>

      <!-- Logo Section -->
      <div class="logo-section">
        <div class="logo-wrapper">
          <img src="/imgs/logo-square.png" alt="Logo" onerror="this.style.display='none';this.parentElement.innerHTML='<i class=\'fas fa-cube\' style=\'font-size:2rem;color:var(--input-focus);\'></i>'">
        </div>
        <h1 class="login-title">Welcome Back</h1>
        <p class="login-subtitle">
          <i class="fas fa-shield-alt"></i>
          Sign in to your admin dashboard
        </p>
        <div style="margin-top: 0.5rem;">
          <span class="badge"><i class="fas fa-lock"></i> Secure Access</span>
        </div>
      </div>

      <!-- Login Form -->
      <form id="loginForm" autocomplete="off">
        <div class="form-group">
          <label for="username">
            <i class="fas fa-user"></i> Username
          </label>
          <div class="input-wrapper">
            <input
              type="text"
              id="username"
              placeholder="Enter your username"
              required
              autocomplete="username"
            >
            <i class="fas fa-user input-icon"></i>
          </div>
        </div>

        <div class="form-group">
          <label for="password">
            <i class="fas fa-lock"></i> Password
          </label>
          <div class="input-wrapper">
            <input
              type="password"
              id="password"
              placeholder="Enter your password"
              required
              autocomplete="current-password"
            >
            <i class="fas fa-key input-icon"></i>
            <button type="button" class="password-toggle" id="togglePassword" aria-label="Toggle password visibility">
              <i class="fas fa-eye"></i>
            </button>
          </div>
        </div>

        <button type="submit" class="login-btn" id="loginBtn">
          <i class="fas fa-sign-in-alt"></i>
          <span>Sign In</span>
        </button>

        <div id="message" class="message"></div>
      </form>

      <!-- Decorative Line -->
      <div class="decorative-line">
        <span>secure admin access</span>
      </div>

      <!-- Footer -->
      <div class="footer">
        <i class="fas fa-lock"></i>
        Read the documentation to get login credentials
        <i class="fas fa-chevron-right"></i>
        <a href="/docs">docs</a>
      </div>

    </div>
  </div>

  <script>
    (function() {
      // ===== THEME TOGGLE =====
      const html = document.documentElement;
      const themeToggle = document.getElementById('themeToggle');
      const savedTheme = localStorage.getItem('tinnybackend-theme');
      
      if (savedTheme) {
        html.setAttribute('data-theme', savedTheme);
      } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
        html.setAttribute('data-theme', 'dark');
      }

      function updateThemeUI(theme) {
        const icon = themeToggle.querySelector('i');
        if (theme === 'dark') {
          icon.classList.remove('fa-moon');
          icon.classList.add('fa-sun');
        } else {
          icon.classList.remove('fa-sun');
          icon.classList.add('fa-moon');
        }
      }

      updateThemeUI(html.getAttribute('data-theme'));

      themeToggle.addEventListener('click', () => {
        const currentTheme = html.getAttribute('data-theme');
        const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
        html.setAttribute('data-theme', newTheme);
        localStorage.setItem('tinnybackend-theme', newTheme);
        updateThemeUI(newTheme);
      });

      if (window.matchMedia) {
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', (e) => {
          if (!localStorage.getItem('tinnybackend-theme')) {
            const newTheme = e.matches ? 'dark' : 'light';
            html.setAttribute('data-theme', newTheme);
            updateThemeUI(newTheme);
          }
        });
      }

      // ===== LOGIN FORM =====
      const loginForm = document.getElementById('loginForm');
      const usernameInput = document.getElementById('username');
      const passwordInput = document.getElementById('password');
      const loginBtn = document.getElementById('loginBtn');
      const messageDiv = document.getElementById('message');
      const togglePassword = document.getElementById('togglePassword');

      // Toggle password visibility
      togglePassword.addEventListener('click', function() {
        const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
        passwordInput.setAttribute('type', type);
        this.querySelector('i').classList.toggle('fa-eye');
        this.querySelector('i').classList.toggle('fa-eye-slash');
      });

      // Show message function
      function showMessage(text, type = 'error') {
        messageDiv.textContent = '';
        messageDiv.className = 'message show ' + type;
        
        const icon = document.createElement('i');
        if (type === 'success') icon.className = 'fas fa-check-circle';
        else if (type === 'info') icon.className = 'fas fa-info-circle';
        else icon.className = 'fas fa-exclamation-circle';
        
        messageDiv.appendChild(icon);
        messageDiv.appendChild(document.createTextNode(' ' + text));
        
        if (type === 'error') {
          messageDiv.classList.add('shake');
          setTimeout(() => {
            messageDiv.classList.remove('shake');
          }, 500);
        }
      }

      function hideMessage() {
        messageDiv.className = 'message';
        messageDiv.textContent = '';
      }

      function setLoading(isLoading) {
        if (isLoading) {
          loginBtn.disabled = true;
          loginBtn.innerHTML = '<span class="spinner"></span> Signing in...';
        } else {
          loginBtn.disabled = false;
          loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> <span>Sign In</span>';
        }
      }

      // Form submission
      loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        hideMessage();

        const username = usernameInput.value.trim();
        const password = passwordInput.value.trim();

        if (!username || !password) {
          showMessage('Please enter both username and password', 'error');
          if (!username) usernameInput.focus();
          else passwordInput.focus();
          return;
        }

        setLoading(true);

        try {
          const response = await fetch('/api/login', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
            },
            body: JSON.stringify({ username, password }),
            credentials: 'same-origin'
          });

          const contentType = response.headers.get('content-type');
          
          if (contentType && contentType.includes('text/html')) {
            showMessage('Login successful! Redirecting to dashboard...', 'success');
            usernameInput.disabled = true;
            passwordInput.disabled = true;
            window.location.href = '/admin/';
            return;
          }

          try {
            const data = await response.json();
            
            if (response.status === 403 || data.Error === 'Access Denied') {
              showMessage('Invalid username or password. Please try again.', 'error');
              passwordInput.value = '';
              passwordInput.focus();
              return;
            }

            if (response.ok && data.success !== false) {
              showMessage('Login successful! Redirecting to dashboard...', 'success');
              usernameInput.disabled = true;
              passwordInput.disabled = true;
              setTimeout(() => {
                window.location.href = '/admin/';
              }, 800);
            } else {
              showMessage(data.message || 'Login failed. Please try again.', 'error');
              passwordInput.value = '';
              passwordInput.focus();
            }
          } catch (jsonError) {
            if (response.redirected) {
              showMessage('Login successful! Redirecting to dashboard...', 'success');
              window.location.href = '/admin/';
            } else {
              if (response.status === 403) {
                showMessage('Invalid username or password. Please try again.', 'error');
                passwordInput.value = '';
                passwordInput.focus();
              } else {
                showMessage('Login failed. Please try again.', 'error');
                passwordInput.value = '';
                passwordInput.focus();
              }
            }
          }
        } catch (error) {
          console.error('Login error:', error);
          showMessage('Network error. Please check your connection and try again.', 'error');
        } finally {
          setLoading(false);
        }
      });

      usernameInput.addEventListener('input', hideMessage);
      passwordInput.addEventListener('input', hideMessage);

      usernameInput.focus();

      passwordInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          loginForm.dispatchEvent(new Event('submit'));
        }
      });

      if (window.performance && window.performance.navigation.type === 1) {
        sessionStorage.removeItem('login_attempt');
      }
    })();
  </script>
</body>
</html>
